<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Clock — Despertador</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@200;300;400;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
/* ══════════════════════════════════════════
   VARIABLES & RESET
══════════════════════════════════════════ */
:root {
  --bg:           #0a0a0f;
  --surface:      rgba(255,255,255,.06);
  --surface2:     rgba(255,255,255,.10);
  --surface3:     rgba(255,255,255,.04);
  --border:       rgba(255,255,255,.09);
  --border2:      rgba(255,255,255,.15);
  --text1:        #f0f0f5;
  --text2:        rgba(240,240,245,.55);
  --text3:        rgba(240,240,245,.28);
  --accent:       #0a84ff;
  --accent2:      #409cff;
  --accent-bg:    rgba(10,132,255,.18);
  --green:        #30d158;
  --red:          #ff453a;
  --orange:       #ff9f0a;
  --face-bg:      #1a1a2e;
  --hand:         #f0f0f5;
  --hand-sec:     #ff453a;
  --font:         'Nunito Sans', -apple-system, sans-serif;
  --mono:         'DM Mono', 'SF Mono', monospace;
  --r-xl: 22px; --r-lg: 16px; --r-md: 12px; --r-sm: 8px;
  --ease: cubic-bezier(.4,0,.2,1);
  --spring: cubic-bezier(.34,1.56,.64,1);
  --shadow: 0 20px 60px rgba(0,0,0,.7), 0 2px 8px rgba(0,0,0,.4);
}
body.light {
  --bg:        #f2f2f7;
  --surface:   rgba(255,255,255,.85);
  --surface2:  rgba(0,0,0,.06);
  --surface3:  rgba(0,0,0,.03);
  --border:    rgba(0,0,0,.07);
  --border2:   rgba(0,0,0,.13);
  --text1:     #1c1c1e;
  --text2:     rgba(60,60,67,.58);
  --text3:     rgba(60,60,67,.30);
  --accent:    #007aff;
  --accent2:   #0051c0;
  --accent-bg: rgba(0,122,255,.12);
  --face-bg:   #ffffff;
  --hand:      #1c1c1e;
  --hand-sec:  #ff3b30;
  --shadow: 0 20px 60px rgba(0,0,0,.12), 0 2px 8px rgba(0,0,0,.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text1);
     -webkit-font-smoothing:antialiased;transition:background .4s,color .4s}

/* ══ BACKGROUND ORBS ══ */
.orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.3;animation:drift 20s ease-in-out infinite}
.o1{width:500px;height:500px;top:-150px;left:-100px;background:radial-gradient(#0a84ff33,transparent);animation-delay:0s}
.o2{width:400px;height:400px;bottom:-100px;right:-80px;background:radial-gradient(#30d15822,transparent);animation-delay:-8s}
.o3{width:300px;height:300px;top:40%;left:35%;background:radial-gradient(#ff9f0a18,transparent);animation-delay:-15s}
body.light .orb{opacity:.1}
@keyframes drift{0%,100%{transform:translate(0,0)}33%{transform:translate(30px,-25px)}66%{transform:translate(-25px,20px)}}

/* ══ APP LAYOUT ══ */
.app{position:relative;z-index:1;display:flex;height:100vh;max-width:980px;margin:0 auto}

/* ══ SIDEBAR ══ */
.sidebar{
  width:200px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;
  padding:28px 12px 20px;
  background:var(--surface);
  backdrop-filter:blur(40px) saturate(180%);
  -webkit-backdrop-filter:blur(40px) saturate(180%);
  border-right:1px solid var(--border);
  transition:background .4s,border-color .4s
}
.logo{display:flex;align-items:center;gap:8px;padding:4px 10px 18px;
      font-weight:700;font-size:1rem;letter-spacing:-.02em;color:var(--text1)}
.logo-icon{font-size:1.1rem;color:var(--accent)}
.logo-v{font-size:.65rem;color:var(--text3);font-weight:400;margin-left:2px}

.nav-btn{
  display:flex;align-items:center;gap:10px;padding:9px 12px;
  border:none;border-radius:var(--r-md);background:transparent;
  color:var(--text2);font-family:var(--font);font-size:.88rem;font-weight:600;
  cursor:pointer;text-align:left;width:100%;
  transition:background .2s,color .2s,transform .12s
}
.nav-btn:hover{background:var(--surface2);color:var(--text1)}
.nav-btn.active{background:var(--accent-bg);color:var(--accent)}
.nav-btn:active{transform:scale(.97)}
.nav-btn svg{flex-shrink:0;opacity:.8}
.nav-btn.active svg{opacity:1}
.nbadge{margin-left:auto;background:var(--accent);color:#fff;
        font-size:.62rem;font-weight:700;padding:1px 5px;
        border-radius:20px;min-width:16px;text-align:center}

.theme-row{margin-top:auto;display:flex;align-items:center;gap:8px;
           padding:8px 12px;border-radius:var(--r-md);cursor:pointer;
           background:transparent;border:none;color:var(--text3);font-size:.82rem;
           width:100%;transition:background .2s}
.theme-row:hover{background:var(--surface2);color:var(--text2)}
.tog-track{width:34px;height:19px;border-radius:20px;background:var(--surface2);
           border:1px solid var(--border2);position:relative;transition:background .3s;flex-shrink:0}
body.light .tog-track{background:var(--accent)}
.tog-thumb{position:absolute;top:2px;left:2px;width:13px;height:13px;
           background:#fff;border-radius:50%;box-shadow:0 1px 4px #0005;
           transition:transform .3s var(--spring)}
body.light .tog-thumb{transform:translateX(15px)}

/* ══ CONTENT ══ */
.content{flex:1;overflow-y:auto;height:100vh;scroll-behavior:smooth}
.panel{display:none;padding:36px 36px 56px;animation:panIn .3s var(--ease)}
.panel.active{display:block}
@keyframes panIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.pt{font-size:1.9rem;font-weight:700;letter-spacing:-.04em}
.ps{font-size:.85rem;color:var(--text2)}

/* ══ APPLE BUTTONS ══ */
.abtn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:10px 22px;border:none;border-radius:980px;
  font-family:var(--font);font-size:.9rem;font-weight:600;cursor:pointer;
  letter-spacing:-.01em;white-space:nowrap;
  transition:transform .12s,opacity .12s,box-shadow .2s,background .2s;
  -webkit-tap-highlight-color:transparent
}
.abtn:active{transform:scale(.95);opacity:.85}
.abtn:disabled{opacity:.32;cursor:not-allowed}
.abtn-p{background:var(--accent);color:#fff;box-shadow:0 4px 16px rgba(10,132,255,.35)}
.abtn-p:hover:not(:disabled){background:var(--accent2);box-shadow:0 6px 24px rgba(10,132,255,.45)}
.abtn-s{background:var(--surface2);color:var(--text1);border:1px solid var(--border2)}
.abtn-s:hover:not(:disabled){background:var(--surface);filter:brightness(1.1)}
.abtn-d{background:rgba(255,69,58,.12);color:var(--red);border:1px solid rgba(255,69,58,.2)}
.abtn-d:hover:not(:disabled){background:rgba(255,69,58,.22)}
.abtn-icon{display:inline-flex;align-items:center;gap:6px;padding:7px 15px;
           border:1px solid var(--border2);border-radius:980px;
           background:var(--surface2);color:var(--accent);
           font-family:var(--font);font-size:.82rem;font-weight:600;cursor:pointer;
           transition:background .2s,transform .12s}
.abtn-icon:hover{background:var(--accent-bg)}
.abtn-icon:active{transform:scale(.96)}
.abtn-circ{width:76px;height:76px;border-radius:50%;padding:0;font-size:.82rem}
.full{width:100%;padding:13px;font-size:.95rem}

/* ══ CARD ══ */
.card{background:var(--surface);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
      border:1px solid var(--border);border-radius:var(--r-lg);
      box-shadow:0 2px 12px rgba(0,0,0,.2);transition:background .4s,border-color .4s}

/* ══ PANEL RELOJ ══ */
.clock-wrap{display:flex;flex-direction:column;align-items:center;gap:24px}

.analog-shell{
  width:clamp(200px,35vw,300px);height:clamp(200px,35vw,300px);
  border-radius:50%;
  background:var(--surface);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
  border:1px solid var(--border2);
  box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.06);
  padding:7px;transition:background .4s,box-shadow .4s
}
.analog-svg{width:100%;height:100%;display:block;overflow:visible}
.cface{transition:fill .4s}
.tick-h{stroke:var(--text2);stroke-width:2.5;stroke-linecap:round}
.tick-m{stroke:var(--text3);stroke-width:1.2;stroke-linecap:round}
.cnum{fill:var(--text2);font-family:var(--font);font-size:9.5px;
      font-weight:600;text-anchor:middle;dominant-baseline:central}
.hhand{stroke:var(--hand);stroke-width:4;stroke-linecap:round;fill:none}
.mhand{stroke:var(--hand);stroke-width:2.8;stroke-linecap:round;fill:none}
.shand{stroke:var(--hand-sec);stroke-width:1.8;stroke-linecap:round;fill:none}
.cap-o{fill:var(--surface);stroke:var(--border2);stroke-width:1}
.cap-i{fill:var(--hand-sec)}
.cap-d{fill:#fff}

.dig-row{display:flex;align-items:baseline;gap:7px}
.dig-t{font-family:var(--mono);font-size:clamp(1.8rem,4.5vw,2.8rem);
       font-weight:300;letter-spacing:-.02em;color:var(--text1)}
.dig-ap{font-size:.95rem;color:var(--text2);font-weight:500}

.prog-card{width:100%;max-width:380px;padding:14px 18px}
.pc-top{display:flex;justify-content:space-between;margin-bottom:9px}
.lbl{font-size:.68rem;font-weight:700;color:var(--text2);letter-spacing:.06em;text-transform:uppercase}
.pct{font-size:.78rem;font-family:var(--mono);color:var(--accent);font-weight:500}
.ptrack{height:4px;background:var(--surface2);border-radius:10px;overflow:hidden}
.pfill{height:100%;background:var(--accent);border-radius:10px;
       transition:width .8s var(--ease);box-shadow:0 0 8px rgba(10,132,255,.4)}
.pc-bot{display:flex;justify-content:space-between;margin-top:7px;
        font-size:.67rem;color:var(--text3);font-family:var(--mono)}

/* ══ PANEL ALARMAS ══ */
.alarm-list{display:flex;flex-direction:column;gap:10px}
.empty-st{display:flex;flex-direction:column;align-items:center;
          gap:8px;padding:50px 0;color:var(--text3)}
.empty-st p{font-size:.95rem;font-weight:500;color:var(--text2)}
.empty-st small{font-size:.82rem}

.acard{display:flex;align-items:center;gap:14px;padding:16px 18px;
       animation:slideIn .3s var(--spring);transition:opacity .3s,transform .3s}
.acard.off{opacity:.45}
@keyframes slideIn{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:none}}
.atime{font-family:var(--mono);font-size:1.85rem;font-weight:300;
       letter-spacing:-.03em;color:var(--text1);line-height:1}
.albl{font-size:.78rem;color:var(--text2);margin-top:3px}
.adays{font-size:.68rem;color:var(--text3);margin-top:2px;letter-spacing:.02em}
.ainfo{flex:1}
.adel{background:none;border:none;color:var(--text3);cursor:pointer;
      width:28px;height:28px;border-radius:50%;display:flex;
      align-items:center;justify-content:center;font-size:1.1rem;
      transition:background .2s,color .2s}
.adel:hover{background:rgba(255,69,58,.14);color:var(--red)}

/* iOS Toggle */
.ios-tog{position:relative;width:50px;height:30px;display:inline-block;cursor:pointer;flex-shrink:0}
.ios-tog input{opacity:0;width:0;height:0}
.ios-sl{position:absolute;inset:0;background:var(--surface2);border-radius:30px;
         border:1px solid var(--border2);transition:background .3s}
.ios-sl::before{content:'';position:absolute;width:24px;height:24px;
                left:2px;bottom:2px;background:#fff;border-radius:50%;
                transition:transform .3s var(--spring);box-shadow:0 2px 5px #0004}
.ios-tog input:checked + .ios-sl{background:var(--green);border-color:var(--green)}
.ios-tog input:checked + .ios-sl::before{transform:translateX(20px)}

/* ══ PANEL TIMER ══ */
.wheel-row{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:24px}
.wsep{font-size:2rem;font-weight:200;color:var(--text2);margin:0 2px;padding-bottom:18px}
.wcol{display:flex;flex-direction:column;align-items:center;gap:3px}
.wlbl{font-size:.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-weight:700}
.wheel{width:86px;height:176px;overflow:hidden;position:relative;cursor:ns-resize;user-select:none;
       border-top:1px solid var(--border2);border-bottom:1px solid var(--border2)}
.wheel::before,.wheel::after{content:'';position:absolute;left:0;right:0;z-index:2;pointer-events:none;height:56px}
.wheel::before{top:0;background:linear-gradient(to bottom,var(--bg) 20%,transparent)}
.wheel::after{bottom:0;background:linear-gradient(to top,var(--bg) 20%,transparent)}
body.light .wheel::before{background:linear-gradient(to bottom,var(--bg) 20%,transparent)}
body.light .wheel::after{background:linear-gradient(to top,var(--bg) 20%,transparent)}
.winn{display:flex;flex-direction:column}
.wi{height:44px;display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-size:1.55rem;font-weight:300;
    color:var(--text3);transition:color .15s,font-size .15s;flex-shrink:0}
.wi.sel{color:var(--text1);font-size:1.85rem;font-weight:400}

.ring-wrap{position:relative;width:200px;height:200px;margin:0 auto 24px;display:none}
.ring-svg{width:100%;height:100%;transform:rotate(-90deg)}
.rbg{fill:none;stroke:var(--surface2);stroke-width:8}
.rfill{fill:none;stroke:var(--accent);stroke-width:8;stroke-linecap:round;
       transition:stroke-dashoffset .5s var(--ease),stroke .5s;
       filter:drop-shadow(0 0 8px rgba(10,132,255,.5))}
.rinn{position:absolute;inset:0;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:3px}
.rtime{font-family:var(--mono);font-size:1.95rem;font-weight:300;
       color:var(--text1);letter-spacing:-.02em}
.rsub{font-size:.72rem;color:var(--text2);text-transform:uppercase;letter-spacing:.08em}

.presets{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-bottom:20px}
.pchip{padding:6px 15px;border:1px solid var(--border2);border-radius:980px;
       background:var(--surface2);color:var(--text2);
       font-family:var(--font);font-size:.8rem;font-weight:500;
       cursor:pointer;transition:background .2s,color .2s,transform .1s}
.pchip:hover{background:var(--surface);color:var(--text1)}
.pchip:active{transform:scale(.95)}
.pchip.active{background:var(--accent-bg);color:var(--accent);border-color:rgba(10,132,255,.3)}
.timer-acts{display:flex;gap:10px;justify-content:center}

/* ══ PANEL CRONO ══ */
.sw-wrap{text-align:center;padding:28px 0 20px}
.sw-t{font-family:var(--mono);font-size:clamp(2.4rem,7vw,4.5rem);
      font-weight:200;color:var(--text1);letter-spacing:-.02em}
.sw-ms{font-size:55%;color:var(--text2)}
.sw-acts{display:flex;align-items:center;justify-content:center;gap:36px;padding-bottom:28px}
.lap-wrap{display:none}
.lap-hdr{display:grid;grid-template-columns:52px 1fr 1fr;padding:9px 18px;
         font-size:.68rem;font-weight:700;color:var(--text3);
         letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid var(--border)}
.lap-rows{max-height:250px;overflow-y:auto}
.lap-r{display:grid;grid-template-columns:52px 1fr 1fr;padding:11px 18px;
       border-bottom:1px solid var(--border);font-family:var(--mono);
       font-size:.88rem;color:var(--text1);animation:fadeUp .22s var(--ease);
       transition:background .2s}
.lap-r:hover{background:var(--surface2)}
.lap-r:last-child{border-bottom:none}
.lap-r.best{color:var(--green)}
.lap-r.worst{color:var(--red)}
.lap-n{color:var(--text3);font-size:.78rem}
@keyframes fadeUp{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:none}}

/* ══ MODALES ══ */
.overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.55);
         backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
         display:flex;align-items:flex-end;justify-content:center;
         animation:fadeO .25s var(--ease)}
.overlay.hidden{display:none}
@keyframes fadeO{from{opacity:0}to{opacity:1}}

.sheet{
  background:rgba(28,28,35,.95);
  backdrop-filter:blur(60px) saturate(200%);-webkit-backdrop-filter:blur(60px) saturate(200%);
  border:1px solid var(--border2);
  border-radius:22px 22px 0 0;
  padding:10px 22px 38px;width:100%;max-width:500px;
  box-shadow:var(--shadow);animation:shUp .35s var(--spring)
}
body.light .sheet{background:rgba(250,250,252,.95)}
@keyframes shUp{from{transform:translateY(100%);opacity:0}to{transform:none;opacity:1}}
.sh-handle{width:34px;height:4px;border-radius:4px;background:var(--surface2);margin:0 auto 18px}
.sh-title{font-size:1.25rem;font-weight:700;letter-spacing:-.03em;margin-bottom:18px}
.sh-tp{text-align:center;margin-bottom:16px}
.big-time-in{font-family:var(--mono);font-size:3.2rem;font-weight:300;
             color:var(--text1);background:transparent;border:none;
             text-align:center;width:100%;outline:none;padding:6px 0;
             border-bottom:1px solid var(--border2)}
.big-time-in::-webkit-calendar-picker-indicator{display:none}
.sh-field{margin-bottom:15px}
.flbl{display:block;font-size:.68rem;font-weight:700;color:var(--text2);
      letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px}
.finput{width:100%;padding:11px 13px;background:var(--surface2);border:1px solid var(--border);
        border-radius:var(--r-md);color:var(--text1);font-family:var(--font);font-size:.92rem;
        outline:none;transition:border-color .2s,box-shadow .2s}
.finput:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(10,132,255,.18)}
.finput::placeholder{color:var(--text3)}
.chips{display:flex;gap:7px;flex-wrap:wrap}
.chip,.daybtn{padding:6px 14px;border:1px solid var(--border2);border-radius:980px;
              background:var(--surface2);color:var(--text2);
              font-family:var(--font);font-size:.8rem;font-weight:500;cursor:pointer;
              transition:all .2s var(--ease)}
.chip.on,.daybtn.on{background:var(--accent-bg);color:var(--accent);border-color:rgba(10,132,255,.3)}
.daybtn{padding:7px 11px;min-width:36px;text-align:center}
.sh-acts{display:flex;gap:10px;margin-top:20px}
.sh-acts .abtn{flex:1;padding:13px;font-size:.92rem}

/* Modal alarma sonando */
.ring-modal{padding-bottom:44px;text-align:center}
.bell-anim{position:relative;width:90px;height:90px;margin:18px auto 14px;
           display:flex;align-items:center;justify-content:center}
.rp{position:absolute;inset:0;border-radius:50%;border:2px solid var(--accent);
    animation:rpulse 2s ease-out infinite}
.rp2{animation-delay:.5s}.rp3{animation-delay:1s}
@keyframes rpulse{0%{transform:scale(1);opacity:.8}100%{transform:scale(2.1);opacity:0}}
.bell{font-size:2.4rem;z-index:1;animation:bswing 1s ease-in-out infinite}
@keyframes bswing{0%,100%{transform:rotate(-14deg)}50%{transform:rotate(14deg)}}
.r-lbl{color:var(--text2);font-size:.88rem;margin-bottom:3px}
.r-time{font-family:var(--mono);font-size:3rem;font-weight:300;
        color:var(--text1);margin-bottom:20px;letter-spacing:-.02em}
.r-acts{display:flex;flex-direction:column;gap:9px}

/* ══ SCROLLBAR ══ */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:4px}

/* ══ RESPONSIVE ══ */
@media(max-width:660px){
  .app{flex-direction:column}
  .sidebar{width:100%;flex-direction:row;height:auto;padding:10px 12px;
           overflow-x:auto;gap:4px;border-right:none;border-bottom:1px solid var(--border)}
  .logo{display:none}
  .nav-btn span:not(.nbadge){display:none}
  .nav-btn{padding:8px 10px;justify-content:center}
  .theme-row>*:not(.tog-track){display:none}
  .content{height:auto}
  .panel{padding:20px 16px 40px}
  .pt{font-size:1.5rem}
  .sheet{border-radius:22px;margin:12px;width:calc(100% - 24px)}
  .overlay{align-items:center}
}
</style>
</head>
<body>

<div class="orbs">
  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="orb o3"></div>
</div>

<div class="app">

  <!-- ─── SIDEBAR ─────────────────── -->
  <nav class="sidebar">
    <div class="logo">
      <span class="logo-icon">⏱</span> Clock <span class="logo-v">Pro</span>
    </div>

    <button class="nav-btn active" data-tab="clock">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>

<script>
'use strict';
/* ══════════════════════════════════════════════
   UTILS
══════════════════════════════════════════════ */
const pad = n => String(n).padStart(2,'0');
const $ = id => document.getElementById(id);
const DIAS  = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const DS    = ['D','L','M','X','J','V','S'];

function fmtMs(ms){
  const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),
        s=Math.floor((ms%60000)/1000),c=Math.floor((ms%1000)/10);
  return h>0?`${pad(h)}:${pad(m)}:${pad(s)}.${pad(c)}`:`${pad(m)}:${pad(s)}.${pad(c)}`;
}
function fmtSec(t){
  const h=Math.floor(t/3600),m=Math.floor((t%3600)/60),s=t%60;
  return h>0?`${pad(h)}:${pad(m)}:${pad(s)}`:`${pad(m)}:${pad(s)}`;
}

/* ══ AUDIO ════════════════════════════════════ */
let _ac=null, _loops=[];
function ac(){
  if(!_ac||_ac.state==='closed') _ac=new(window.AudioContext||window.webkitAudioContext)();
  if(_ac.state==='suspended') _ac.resume();
  return _ac;
}
function beep(freq,t,dur,g=.32,type='sine'){
  const ctx=ac(),o=ctx.createOscillator(),a=ctx.createGain();
  o.type=type; o.frequency.setValueAtTime(freq,t);
  a.gain.setValueAtTime(0,t);
  a.gain.linearRampToValueAtTime(g,t+.01);
  a.gain.exponentialRampToValueAtTime(.001,t+dur);
  o.connect(a);a.connect(ctx.destination);
  o.start(t);o.stop(t+dur+.05);
}
const SNDS={
  beep:c=>{const t=c.currentTime;beep(880,t,.12,.28,'square');beep(880,t+.18,.12,.28,'square');beep(1108,t+.38,.22,.28,'square')},
  pulse:c=>{const t=c.currentTime;for(let i=0;i<6;i++)beep(660,t+i*.14,.09,.22,'sine')},
  digital:c=>{const t=c.currentTime;[523,659,784,1047].forEach((f,i)=>beep(f,t+i*.07,.07,.22,'square'))},
  siren:c=>{const t=c.currentTime,ctx=ac(),o=ctx.createOscillator(),a=ctx.createGain();
    o.type='sawtooth';o.frequency.setValueAtTime(400,t);o.frequency.linearRampToValueAtTime(800,t+.4);o.frequency.linearRampToValueAtTime(400,t+.8);
    a.gain.setValueAtTime(.28,t);a.gain.setValueAtTime(.28,t+.75);a.gain.linearRampToValueAtTime(0,t+.9);
    o.connect(a);a.connect(ctx.destination);o.start(t);o.stop(t+.95);}
};
function startSnd(name='beep'){
  stopSnd();
  const fn=SNDS[name]||SNDS.beep;
  fn(ac());
  _loops.push(setInterval(()=>fn(ac()),1000));
}
function stopSnd(){_loops.forEach(clearInterval);_loops=[];if(_ac){_ac.close().catch(()=>{});_ac=null;}}
function ping(){const ctx=ac(),t=ctx.currentTime;beep(1047,t,.08,.12,'sine');beep(1319,t+.09,.08,.1,'sine');}

/* ══ NAVEGACIÓN ══════════════════════════════ */
document.querySelectorAll('.nav-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    $('panel-'+btn.dataset.tab).classList.add('active');
  });
});

/* ══ TEMA ════════════════════════════════════ */
$('themeBtn').addEventListener('click',()=>document.body.classList.toggle('light'));

/* ══ RELOJ ANALÓGICO ════════════════════════ */
(function buildFace(){
  const cx=105,cy=105,r=100;
  const tH=$('tH'),tM=$('tM'),tN=$('cNums');
  for(let i=0;i<60;i++){
    const ang=(i/60)*2*Math.PI-Math.PI/2;
    const isH=i%5===0, len=isH?10:5;
    const x1=cx+(r-1)*Math.cos(ang),y1=cy+(r-1)*Math.sin(ang);
    const x2=cx+(r-1-len)*Math.cos(ang),y2=cy+(r-1-len)*Math.sin(ang);
    const ln=document.createElementNS('http://www.w3.org/2000/svg','line');
    ln.setAttribute('x1',x1);ln.setAttribute('y1',y1);
    ln.setAttribute('x2',x2);ln.setAttribute('y2',y2);
    ln.setAttribute('class',isH?'tick-h':'tick-m');
    (isH?tH:tM).appendChild(ln);
  }
  for(let h=1;h<=12;h++){
    const ang=(h/12)*2*Math.PI-Math.PI/2,nr=r-22;
    const tx=document.createElementNS('http://www.w3.org/2000/svg','text');
    tx.setAttribute('x',cx+nr*Math.cos(ang));
    tx.setAttribute('y',cy+nr*Math.sin(ang));
    tx.setAttribute('class','cnum');
    tx.textContent=h;
    tN.appendChild(tx);
  }
})();

function rotateLine(id,deg,cx=105,cy=105){
  const el=$(id); if(!el)return;
  const rad=(deg-90)*Math.PI/180;
  const lens={lH:53,lM:68,lS:78};
  const tails={lS:13};
  const len=lens[id],tail=tails[id]||0;
  el.setAttribute('x2',cx+len*Math.cos(rad));
  el.setAttribute('y2',cy+len*Math.sin(rad));
  if(tail){el.setAttribute('x1',cx-tail*Math.cos(rad));el.setAttribute('y1',cy-tail*Math.sin(rad));}
}

// Smooth animation
(function smoothClock(){
  function tick(){
    const n=new Date();
    const ms=n.getMilliseconds();
    const s=n.getSeconds()+ms/1000;
    const m=n.getMinutes()+s/60;
    const h=n.getHours()+m/60;
    rotateLine('lS',s*6);
    rotateLine('lM',m*6);
    rotateLine('lH',(h%12)*30);
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();

function updateClockInfo(){
  const n=new Date();
  const h=n.getHours(),m=n.getMinutes(),s=n.getSeconds();
  const h12=h%12||12,ap=h<12?'AM':'PM';
  $('digT').textContent=`${pad(h12)}:${pad(m)}:${pad(s)}`;
  $('digAP').textContent=ap;
  $('clockDate').textContent=`${DIAS[n.getDay()]}, ${n.getDate()} de ${MESES[n.getMonth()]} ${n.getFullYear()}`;
  const sec=h*3600+m*60+s;
  const pct=(sec/86400*100).toFixed(1);
  $('dayFill').style.width=pct+'%';
  $('dayPct').textContent=pct+'%';
  checkAlarms(h,m,s);
}
setInterval(updateClockInfo,1000);
updateClockInfo();

/* ══ ALARMAS ════════════════════════════════ */
let alarms=JSON.parse(localStorage.getItem('clk_alarms')||'[]');
let ringId=null,snoozeT=null;
function saveA(){localStorage.setItem('clk_alarms',JSON.stringify(alarms));}

function renderAlarms(){
  const list=$('alarmList'),empty=$('emptyAlarms'),badge=$('nbadge');
  list.querySelectorAll('.acard').forEach(e=>e.remove());
  const on=alarms.filter(a=>a.on).length;
  badge.textContent=on; badge.style.display=on?'inline-flex':'none';
  empty.style.display=alarms.length?'none':'flex';
  [...alarms].sort((a,b)=>a.time.localeCompare(b.time)).forEach(al=>{
    const dL=al.days.length===7?'Todos los días':al.days.length===0?'Una vez':al.days.map(d=>DS[d]).join(' · ');
    const c=document.createElement('div');
    c.className='card acard'+(al.on?'':' off');
    c.innerHTML=`
      <div class="ainfo">
        <div class="atime">${al.time}</div>
        <div class="albl">${al.label||'Alarma'}</div>
        <div class="adays">${dL} · ${al.sound}</div>
      </div>
      <label class="ios-tog">
        <input type="checkbox"${al.on?' checked':''}/>
        <span class="ios-sl"></span>
      </label>
      <button class="adel">×</button>`;
    c.querySelector('input').addEventListener('change',e=>{al.on=e.target.checked;c.classList.toggle('off',!al.on);saveA();renderAlarms();});
    c.querySelector('.adel').addEventListener('click',()=>{
      alarms=alarms.filter(a=>a.id!==al.id);saveA();
      c.style.transform='translateX(16px)';c.style.opacity='0';
      setTimeout(renderAlarms,280);
    });
    list.appendChild(c);
  });
}

function checkAlarms(h,m,s){
  if(s!==0)return;
  const hhmm=`${pad(h)}:${pad(m)}`;
  const dow=new Date().getDay();
  alarms.forEach(al=>{
    if(!al.on||al.id===ringId)return;
    if(al.time!==hhmm)return;
    if(al.days.length>0&&!al.days.includes(dow))return;
    fireAlarm(al);
  });
}
function fireAlarm(al){
  ringId=al.id;
  $('rLbl').textContent=al.label||'Alarma';
  $('rTime').textContent=al.time;
  $('ovRing').classList.remove('hidden');
  startSnd(al.sound||'beep');
  if(al.days.length===0){al.on=false;saveA();renderAlarms();}
}
$('btnDismiss').addEventListener('click',()=>{
  stopSnd();ringId=null;
  if(snoozeT){clearTimeout(snoozeT);snoozeT=null;}
  $('ovRing').classList.add('hidden');
});
$('btnSnooze').addEventListener('click',()=>{
  stopSnd();$('ovRing').classList.add('hidden');
  const id=ringId;ringId=null;
  snoozeT=setTimeout(()=>{
    const al=alarms.find(a=>a.id===id);
    if(al){$('rLbl').textContent=(al.label||'Alarma')+' (pospuesta)';$('rTime').textContent=al.time;$('ovRing').classList.remove('hidden');startSnd(al.sound||'beep');}
  },5*60*1000);
});

/* Modal nueva alarma */
let selSound='beep',selDays=[];
$('btnNew').addEventListener('click',()=>{
  const n=new Date();
  $('nTime').value=`${pad(n.getHours())}:${pad(n.getMinutes())}`;
  $('nLabel').value=''; selSound='beep'; selDays=[];
  document.querySelectorAll('.soundChips .chip,.chip').forEach(c=>c.classList.toggle('on',c.dataset.s==='beep'));
  document.querySelectorAll('.daybtn').forEach(b=>b.classList.remove('on'));
  $('ovNew').classList.remove('hidden');
});
$('soundChips').addEventListener('click',e=>{
  if(!e.target.matches('.chip'))return;
  selSound=e.target.dataset.s;
  document.querySelectorAll('#soundChips .chip').forEach(c=>c.classList.remove('on'));
  e.target.classList.add('on');
  ping(); setTimeout(()=>{const fn=SNDS[selSound];if(fn)fn(ac());},120);
});
document.querySelectorAll('.daybtn').forEach(b=>{
  b.addEventListener('click',()=>{
    const d=parseInt(b.dataset.d),i=selDays.indexOf(d);
    i===-1?(selDays.push(d),b.classList.add('on')):(selDays.splice(i,1),b.classList.remove('on'));
  });
});
$('btnCancelNew').addEventListener('click',()=>$('ovNew').classList.add('hidden'));
$('ovNew').addEventListener('click',e=>{if(e.target===$('ovNew'))$('ovNew').classList.add('hidden');});
$('btnSaveNew').addEventListener('click',()=>{
  const t=$('nTime').value; if(!t){$('nTime').focus();return;}
  alarms.push({id:Date.now(),time:t,label:$('nLabel').value.trim()||'Alarma',sound:selSound,days:[...selDays],on:true});
  saveA();renderAlarms();ping();$('ovNew').classList.add('hidden');
});
renderAlarms();

/* ══ TIMER — RUEDAS ═══════════════════════════ */
const WS={H:{max:23,v:0},M:{max:59,v:5},S:{max:59,v:0}};
['H','M','S'].forEach(k=>{
  const inn=$('wi'+k),w=$('w'+k);
  for(let i=0;i<=WS[k].max;i++){
    const d=document.createElement('div');
    d.className='wi';d.textContent=pad(i);
    inn.appendChild(d);
  }
  setW(k,WS[k].v,false);

  let sY,sV,drag=false;
  const start=e=>{drag=true;sY=(e.touches?e.touches[0].clientY:e.clientY);sV=WS[k].v;};
  const move=e=>{
    if(!drag)return;e.preventDefault();
    const y=(e.touches?e.touches[0].clientY:e.clientY);
    setW(k,sV+Math.round((sY-y)/44));
  };
  const end=()=>{drag=false;};
  w.addEventListener('mousedown',start);
  w.addEventListener('touchstart',start,{passive:true});
  window.addEventListener('mousemove',move);
  window.addEventListener('touchmove',move,{passive:false});
  window.addEventListener('mouseup',end);
  window.addEventListener('touchend',end);
  w.addEventListener('wheel',e=>{e.preventDefault();setW(k,WS[k].v+(e.deltaY>0?1:-1));},{passive:false});
});
function setW(k,val,anim=true){
  const ws=WS[k],inn=$('wi'+k);
  ws.v=Math.max(0,Math.min(ws.max,val));
  inn.querySelectorAll('.wi').forEach((el,i)=>el.classList.toggle('sel',i===ws.v));
  const off=ws.v*44-(176/2-44/2);
  inn.style.transition=anim?'transform .18s cubic-bezier(.4,0,.2,1)':'none';
  inn.style.transform=`translateY(${-off}px)`;
}
function getTimerSec(){return WS.H.v*3600+WS.M.v*60+WS.S.v;}

/* Timer logic */
const CIRC=2*Math.PI*88;
let tTotal=0,tLeft=0,tIv=null,tRunning=false;
function setTimerSec(h,m,s){setW('H',h);setW('M',m);setW('S',s);}
function tShow(state){
  const idle=state==='idle';
  $('wRow').style.display=idle?'flex':'none';
  $('ringWrap').style.display=idle?'none':'flex';
  $('timerPresets').style.display=idle?'flex':'none';
  $('btnTStart').style.display=idle?'inline-flex':'none';
  $('btnTPause').style.display=state==='running'?'inline-flex':'none';
  $('btnTResume').style.display=state==='paused'?'inline-flex':'none';
  $('btnTCancel').style.display=idle?'none':'inline-flex';
}
tShow('idle');
function updRing(){
  const pct=tTotal>0?tLeft/tTotal:0;
  $('rfill').style.strokeDashoffset=CIRC*(1-pct);
  $('tDisp').textContent=fmtSec(tLeft);
  $('tSub').textContent=tLeft>0?'restante':'¡Listo!';
  $('rfill').style.stroke=pct<.1?'var(--red)':pct<.25?'var(--orange)':'var(--accent)';
}
document.querySelectorAll('.pchip').forEach(c=>{
  c.addEventListener('click',()=>{
    document.querySelectorAll('.pchip').forEach(x=>x.classList.remove('active'));
    c.classList.add('active');
    setTimerSec(+c.dataset.h,+c.dataset.m,+c.dataset.s);
  });
});
$('btnTStart').addEventListener('click',()=>{
  const s=getTimerSec();if(!s)return;
  tTotal=s;tLeft=s;tRunning=true;updRing();tShow('running');ping();
  tIv=setInterval(()=>{tLeft--;updRing();if(tLeft<=0){clearInterval(tIv);tRunning=false;tShow('idle');startSnd('digital');$('ovTimerDone').classList.remove('hidden');}},1000);
});
$('btnTPause').addEventListener('click',()=>{clearInterval(tIv);tRunning=false;tShow('paused');});
$('btnTResume').addEventListener('click',()=>{
  tRunning=true;tShow('running');
  tIv=setInterval(()=>{tLeft--;updRing();if(tLeft<=0){clearInterval(tIv);tRunning=false;tShow('idle');startSnd('digital');$('ovTimerDone').classList.remove('hidden');}},1000);
});
$('btnTCancel').addEventListener('click',()=>{clearInterval(tIv);tRunning=false;tLeft=0;tTotal=0;updRing();tShow('idle');});
$('btnTDone').addEventListener('click',()=>{stopSnd();$('ovTimerDone').classList.add('hidden');});

/* ══ CRONÓMETRO ══════════════════════════════ */
let swRun=false,swEl=0,swSt=0,swFr=null,laps=[],lastLap=0;
function fmtSwTime(ms){
  const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),
        s=Math.floor((ms%60000)/1000),c=Math.floor((ms%1000)/10);
  const main=h>0?`${pad(h)}:${pad(m)}:${pad(s)}`:`${pad(m)}:${pad(s)}`;
  return `${main}<span class="sw-ms">.${pad(c)}</span>`;
}
function swRender(ms){$('swT').innerHTML=fmtSwTime(ms);}
function swTick(){
  const now=performance.now(),delta=now-swSt;
  swRender(swEl+delta);
  swFr=requestAnimationFrame(swTick);
}
$('btnSwStart').addEventListener('click',()=>{
  if(!swRun){
    swRun=true;swSt=performance.now();
    swFr=requestAnimationFrame(swTick);
    $('btnSwStart').textContent='Detener';
    $('btnSwStart').classList.replace('abtn-p','abtn-d');
    $('btnLap').disabled=false;
    $('btnLap').textContent='Vuelta';
  } else {
    cancelAnimationFrame(swFr);
    swEl+=performance.now()-swSt;swSt=0;swRun=false;
    swRender(swEl);
    $('btnSwStart').textContent='Iniciar';
    $('btnSwStart').classList.replace('abtn-d','abtn-p');
    $('btnLap').textContent='Reiniciar';
  }
});
$('btnLap').addEventListener('click',()=>{
  if(swRun){
    const now=performance.now(),total=swEl+(now-swSt),partial=total-lastLap;
    lastLap=total;
    laps.unshift({n:laps.length+1,partial,total});
    renderLaps();$('lapWrap').style.display='block';
  } else {
    cancelAnimationFrame(swFr);
    swEl=0;swSt=0;swRun=false;lastLap=0;laps=[];
    swRender(0);$('lapWrap').style.display='none';$('lapRows').innerHTML='';
    $('btnSwStart').textContent='Iniciar';$('btnSwStart').classList.replace('abtn-d','abtn-p');
    $('btnLap').disabled=true;$('btnLap').textContent='Vuelta';
  }
});
function renderLaps(){
  const pts=laps.map(l=>l.partial),best=Math.min(...pts),worst=Math.max(...pts);
  $('lapRows').innerHTML='';
  laps.forEach(l=>{
    const r=document.createElement('div');
    r.className='lap-r'+(laps.length>1&&l.partial===best?' best':laps.length>1&&l.partial===worst?' worst':'');
    r.innerHTML=`<span class="lap-n">${pad(l.n)}</span><span>${fmtMs(l.partial)}</span><span>${fmtMs(l.total)}</span>`;
    $('lapRows').appendChild(r);
  });
}
</script>
